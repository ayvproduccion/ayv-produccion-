<!-- Campo de Subida de Archivos -->
<div class="file-upload-wrapper">
    <label for="file-upload" class="file-label">
        <span class="icon">📁</span>
        <span class="text">Adjuntar guion o referencias (PDF, JPG, PNG)</span>
        <input type="file" id="file-upload" name="adjunto" hidden onchange="updateFileName(this)">
    </label>
    <div id="file-name-display" style="font-size: 12px; color: #25D366; margin-top: 5px;"></div>
</div>

<style>
    .file-upload-wrapper {
        margin-top: 10px;
    }
    .file-label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px;
        border: 2px dashed #333;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #0f0f0f;
    }
    .file-label:hover {
        border-color: #888;
        background: #1a1a1a;
    }
    .file-label .icon { font-size: 20px; }
    .file-label .text { font-size: 14px; color: #888; }
</style>

<script>
    // Función para mostrar el nombre del archivo seleccionado
    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        if (input.files.length > 0) {
            display.innerText = "Archivo listo: " + input.files[0].name;
        }
    }
</script>
